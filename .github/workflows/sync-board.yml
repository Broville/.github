name: Sync Issue to Broville Roadmap Board

on:
  issues:
    types: [opened, reopened, closed, labeled, unlabeled]

permissions:
  issues: read
  contents: read

jobs:
  sync-to-board:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .github repo
        uses: actions/checkout@v4
        with:
          repository: Broville/.github
          token: ${{ steps.app-token.outputs.token || github.token }}
          path: .github-org

      - name: Generate GitHub App Token
        id: app-token
        run: |
          pip install PyJWT cryptography
          python3 .github-org/scripts/generate_app_token.py
        env:
          APP_ID: ${{ secrets.BROVILLE_APP_ID }}
          INSTALL_ID: ${{ secrets.BROVILLE_INSTALL_ID }}
          APP_PRIVATE_KEY: ${{ secrets.BROVILLE_APP_PRIVATE_KEY }}
          GITHUB_OUTPUT: ${{ github.output }}

      - name: Sync Issue to Board
        run: python3 .github-org/scripts/sync-issue-to-board.py
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_STATE: ${{ github.event.issue.state }}
          LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
